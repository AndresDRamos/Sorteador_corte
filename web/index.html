<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteador de corte - Visor DXF</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Sorteador de corte</h1>
      <!-- El uploader se monta aqui desde main.js -->
      <div id="uploader-slot"></div>
    </header>

    <main class="layout">
      <!-- Contenedor del visor SVG; el render lo inyecta como hijo. Ocupa ~70% del alto. -->
      <section id="viewer" class="viewer"></section>

      <!-- Panel inferior con tarjetas agrupadas por proceso siguiente. Ocupa ~30% del alto. -->
      <aside id="parts-panel" class="panel">
        <div id="parts-list" class="parts-list"></div>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
