<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorteador de corte - Visor DXF</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Sorteador de corte</h1>
      <!-- El uploader se monta aqui desde main.js -->
      <div id="uploader-slot"></div>
    </header>

    <main class="layout">
      <!-- Panel lateral con la lista de partes detectadas. -->
      <aside id="parts-panel" class="panel">
        <h2>Partes</h2>
        <ul id="parts-list" class="parts-list"></ul>
      </aside>

      <!-- Contenedor del visor SVG; el render lo inyecta como hijo. -->
      <section id="viewer" class="viewer"></section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
